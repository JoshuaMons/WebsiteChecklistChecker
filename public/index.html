<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Audit Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100">
  <div class="max-w-3xl mx-auto px-4 py-10">
    <header class="text-center mb-10">
      <h1 class="text-3xl font-bold text-white tracking-tight">Website Audit</h1>
      <p class="text-slate-400 mt-1">Enter a URL to run an automated checklist and get a report.</p>
    </header>

    <div class="rounded-xl bg-slate-800/80 border border-slate-700 p-6 mb-6">
      <h2 class="text-lg font-semibold text-white mb-3">Checklist</h2>
      <div class="space-y-3">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="checklist-mode" value="default" checked class="rounded-full border-slate-500 text-amber-500 focus:ring-amber-500 bg-slate-800" />
          <span class="text-slate-200">Default checklist</span>
          <span class="text-slate-500 text-sm">(all Website + SEO checks)</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="checklist-mode" value="custom" class="rounded-full border-slate-500 text-amber-500 focus:ring-amber-500 bg-slate-800" />
          <span class="text-slate-200">Custom checklist</span>
          <span class="text-slate-500 text-sm">(choose which checks to run)</span>
        </label>
      </div>
      <div id="custom-checklist" class="hidden mt-4 pt-4 border-t border-slate-600">
        <p class="text-slate-400 text-sm mb-3">Select the checks to run:</p>
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <p class="text-amber-400/90 text-sm font-medium mb-2">Website</p>
            <div class="space-y-2">
              <label class="flex items-center gap-2 cursor-pointer text-slate-300"><input type="checkbox" name="check" value="live" class="rounded border-slate-500 text-amber-500 bg-slate-800" /> Website live</label>
              <label class="flex items-center gap-2 cursor-pointer text-slate-300"><input type="checkbox" name="check" value="mobile" class="rounded border-slate-500 text-amber-500 bg-slate-800" /> Works on mobile</label>
              <label class="flex items-center gap-2 cursor-pointer text-slate-300"><input type="checkbox" name="check" value="googleMaps" class="rounded border-slate-500 text-amber-500 bg-slate-800" /> Google Maps works</label>
              <label class="flex items-center gap-2 cursor-pointer text-slate-300"><input type="checkbox" name="check" value="contactDetails" class="rounded border-slate-500 text-amber-500 bg-slate-800" /> Contact details present</label>
              <label class="flex items-center gap-2 cursor-pointer text-slate-300"><input type="checkbox" name="check" value="imagesCorrect" class="rounded border-slate-500 text-amber-500 bg-slate-800" /> Images correct</label>
            </div>
          </div>
          <div>
            <p class="text-amber-400/90 text-sm font-medium mb-2">SEO</p>
            <div class="space-y-2">
              <label class="flex items-center gap-2 cursor-pointer text-slate-300"><input type="checkbox" name="check" value="cityInTitle" class="rounded border-slate-500 text-amber-500 bg-slate-800" /> City in title</label>
              <label class="flex items-center gap-2 cursor-pointer text-slate-300"><input type="checkbox" name="check" value="metaDescription" class="rounded border-slate-500 text-amber-500 bg-slate-800" /> Meta description</label>
              <label class="flex items-center gap-2 cursor-pointer text-slate-300"><input type="checkbox" name="check" value="altText" class="rounded border-slate-500 text-amber-500 bg-slate-800" /> Alt text on images</label>
            </div>
          </div>
        </div>
        <p id="custom-checklist-warning" class="hidden text-amber-400/90 text-sm mt-2">Select at least one check.</p>
      </div>
    </div>

    <form id="audit-form" class="flex flex-col sm:flex-row gap-3 mb-8">
      <input
        type="url"
        id="url-input"
        placeholder="https://example.com"
        class="flex-1 rounded-lg border border-slate-600 bg-slate-800 px-4 py-3 text-white placeholder-slate-500 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition"
        required
      />
      <button
        type="submit"
        id="submit-btn"
        class="rounded-lg bg-amber-500 px-6 py-3 font-semibold text-slate-900 hover:bg-amber-400 focus:ring-2 focus:ring-amber-400 focus:ring-offset-2 focus:ring-offset-slate-900 transition disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Run Website Audit
      </button>
    </form>

    <div id="loading" class="hidden text-center py-12">
      <div class="inline-block w-10 h-10 border-2 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-slate-400 mt-4">Loading and analyzing website…</p>
    </div>

    <div id="error" class="hidden rounded-lg bg-red-500/20 border border-red-500/50 text-red-200 px-4 py-3 mb-6"></div>

    <div id="report" class="hidden space-y-8">
      <div class="rounded-xl bg-slate-800/80 border border-slate-700 p-6">
        <h2 class="text-lg font-semibold text-white mb-1">Score</h2>
        <p id="score-text" class="text-2xl font-bold text-amber-400">0 / 0</p>
      </div>

      <section class="rounded-xl bg-slate-800/80 border border-slate-700 overflow-hidden">
        <h2 class="px-6 py-4 font-semibold text-white bg-slate-800/50 border-b border-slate-700">Website Check</h2>
        <ul id="website-checklist" class="p-6 space-y-2"></ul>
      </section>

      <section class="rounded-xl bg-slate-800/80 border border-slate-700 overflow-hidden">
        <h2 class="px-6 py-4 font-semibold text-white bg-slate-800/50 border-b border-slate-700">SEO Check</h2>
        <ul id="seo-checklist" class="p-6 space-y-2"></ul>
      </section>
    </div>
  </div>

  <script>
    const form = document.getElementById('audit-form');
    const urlInput = document.getElementById('url-input');
    const submitBtn = document.getElementById('submit-btn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const report = document.getElementById('report');
    const customChecklistEl = document.getElementById('custom-checklist');
    const customWarning = document.getElementById('custom-checklist-warning');

    document.querySelectorAll('input[name="checklist-mode"]').forEach((radio) => {
      radio.addEventListener('change', () => {
        const isCustom = document.querySelector('input[name="checklist-mode"]:checked').value === 'custom';
        customChecklistEl.classList.toggle('hidden', !isCustom);
        customWarning.classList.add('hidden');
      });
    });

    function getChecklistPayload() {
      const mode = document.querySelector('input[name="checklist-mode"]:checked').value;
      if (mode === 'default') return 'default';
      const selected = Array.from(document.querySelectorAll('input[name="check"]:checked')).map((c) => c.value);
      return selected;
    }

    function showLoading(show) {
      loading.classList.toggle('hidden', !show);
      submitBtn.disabled = show;
    }

    function showError(msg) {
      error.textContent = msg;
      error.classList.remove('hidden');
    }

    function hideError() {
      error.classList.add('hidden');
    }

    function renderItem(passed, label) {
      const li = document.createElement('li');
      li.className = 'flex items-center gap-2 text-slate-200';
      li.innerHTML = passed
        ? '<span class="text-green-500 font-bold" aria-hidden="true">✓</span> ' + label
        : '<span class="text-red-500 font-bold" aria-hidden="true">✗</span> ' + label;
      return li;
    }

    function renderReport(data) {
      hideError();
      report.classList.remove('hidden');

      document.getElementById('score-text').textContent =
        data.score.passed + ' / ' + data.score.total;

      const labels = data.checklistLabels || {};
      const websiteList = document.getElementById('website-checklist');
      const websiteSection = websiteList.closest('section');
      websiteList.innerHTML = '';
      Object.entries(data.websiteCheck).forEach(([key, value]) => {
        websiteList.appendChild(renderItem(value, labels[key] || key));
      });
      websiteSection.classList.toggle('hidden', Object.keys(data.websiteCheck).length === 0);

      const seoList = document.getElementById('seo-checklist');
      const seoSection = seoList.closest('section');
      seoList.innerHTML = '';
      Object.entries(data.seoCheck).forEach(([key, value]) => {
        seoList.appendChild(renderItem(value, labels[key] || key));
      });
      seoSection.classList.toggle('hidden', Object.keys(data.seoCheck).length === 0);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;

      const checklist = getChecklistPayload();
      if (Array.isArray(checklist) && checklist.length === 0) {
        customWarning.classList.remove('hidden');
        return;
      }
      customWarning.classList.add('hidden');

      showLoading(true);
      hideError();
      report.classList.add('hidden');

      try {
        const res = await fetch('/api/audit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, checklist }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.message || data.error || 'Audit failed');
          return;
        }

        renderReport(data);
      } catch (err) {
        showError('Network error. Is the server running?');
      } finally {
        showLoading(false);
      }
    });
  </script>
</body>
</html>
